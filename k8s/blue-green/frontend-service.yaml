apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-blue
  namespace: newevent
  labels:
    app: frontend-service
    slot: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
      slot: blue
  template:
    metadata:
      labels:
        app: frontend-service
        slot: blue
    spec:
      containers:
        - name: frontend-service
          image: newevent/frontend-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-green
  namespace: newevent
  labels:
    app: frontend-service
    slot: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: frontend-service
      slot: green
  template:
    metadata:
      labels:
        app: frontend-service
        slot: green
    spec:
      containers:
        - name: frontend-service
          image: newevent/frontend-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: newevent
spec:
  selector:
    app: frontend-service
    slot: blue
  ports:
    - port: 80
      targetPort: 80
