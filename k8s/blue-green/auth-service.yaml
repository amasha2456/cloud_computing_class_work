apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-blue
  namespace: newevent
  labels:
    app: auth-service
    slot: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
      slot: blue
  template:
    metadata:
      labels:
        app: auth-service
        slot: blue
    spec:
      containers:
        - name: auth-service
          image: newevent/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5006
          env:
            - name: PORT
              value: "5006"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet: { path: /health, port: 5006 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5006 }
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-green
  namespace: newevent
  labels:
    app: auth-service
    slot: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: auth-service
      slot: green
  template:
    metadata:
      labels:
        app: auth-service
        slot: green
    spec:
      containers:
        - name: auth-service
          image: newevent/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5006
          env:
            - name: PORT
              value: "5006"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet: { path: /health, port: 5006 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5006 }
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: newevent
spec:
  selector:
    app: auth-service
    slot: blue
  ports:
    - port: 5006
      targetPort: 5006
