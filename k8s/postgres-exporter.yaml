apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: newevent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: newevent
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
