version: "3.9"

services:
  frontend-service:
    build:
      context: ./services/frontend-service

    ports:
      - "8080:80"

    depends_on:
      - event-service
      - program-service
      - registration-service
      - analytics-service
      - auth-service

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newevent

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  event-service:
    build:
      context: ./services/event-service

    environment:
      PORT: 5001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: newevent
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5001:5001"

    depends_on:
      - postgres

  program-service:
    build:
      context: ./services/program-service

    environment:
      PORT: 5002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: newevent
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5002:5002"

    depends_on:
      - postgres

  registration-service:
    build:
      context: ./services/registration-service

    environment:
      PORT: 5003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: newevent
      EVENT_SERVICE_URL: http://event-service:5001
      EMAIL_SERVICE_URL: http://email-service:5004
      SEATS_AVAILABLE_THRESHOLD: 10
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      LOW_SEATS_LAMBDA_NAME: ${LOW_SEATS_LAMBDA_NAME}
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5003:5003"

    depends_on:
      - postgres
      - event-service
      - email-service

  email-service:
    build:
      context: ./services/email-service

    environment:
      PORT: 5004
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5004:5004"

  auth-service:
    build:
      context: ./services/auth-service

    environment:
      PORT: 5006
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5006:5006"

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine

    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    ports:
      - "8123:8123"
      - "9000:9000"

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  analytics-service:
    build:
      context: ./services/analytics-service

    environment:
      PORT: 5005
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      FLUSH_INTERVAL_MS: 5000
      FLUSH_MAX_BUFFER: 500
      CORS_ORIGIN: ${CORS_ORIGIN}

    ports:
      - "5005:5005"

    depends_on:
      - clickhouse

  superset:
    build:
      context: ./superset

    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DATABASE_URI: postgresql+psycopg2://postgres:postgres@postgres:5432/superset
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: admin@example.com

    ports:
      - "8088:8088"

    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started

    restart: on-failure

  superset-seed:
    image: node:22-alpine

    volumes:
      - ./superset/seed-dashboard.mjs:/seed.mjs:ro

    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    command: ["node", "/seed.mjs"]

    depends_on:
      - superset

    restart: "no"

  prometheus:
    image: prom/prometheus:latest

    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    ports:
      - "9090:9090"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest

    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/newevent?sslmode=disable

    ports:
      - "9187:9187"

    depends_on:
      - postgres

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

    ports:
      - "8081:8080"

  grafana:
    image: grafana/grafana:latest

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  postgres_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
