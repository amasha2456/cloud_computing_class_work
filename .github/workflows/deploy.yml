name: Deploy (Blue-Green to AWS)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write kubeconfig for the real k3s cluster
        run: |
          mkdir -p k8s/aws
          echo "${{ secrets.KUBECONFIG }}" > k8s/aws/kubeconfig
          chmod 600 k8s/aws/kubeconfig

      - name: Write .env (source for the K8s app-secrets Secret)
        run: echo "${{ secrets.APP_ENV_FILE }}" > .env

      - name: Deploy (build, push to GHCR, blue-green cutover)
        run: |
          export TAG="$(git rev-parse --short HEAD)"
          bash k8s/aws/deploy-aws.sh
