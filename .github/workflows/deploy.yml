name: Deploy (Blue-Green to AWS via SSH)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write .env (source for the K8s app-secrets Secret)
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: printf '%s\n' "$APP_ENV_FILE" > .env

      - name: Write SSH private key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy (build, push to GHCR, SSH in for blue-green cutover)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: /home/runner/.ssh/deploy_key
        run: |
          export TAG="$(git rev-parse --short HEAD)"
          bash k8s/aws/deploy-aws.sh
