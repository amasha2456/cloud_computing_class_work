name: CD Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Write .env (source for the K8s app-secrets Secret)
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: printf '%s\n' "$APP_ENV_FILE" > .env

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Lambda functions
        run: |
          export AWS_ACCESS_KEY_ID=$(grep '^AWS_ACCESS_KEY_ID=' .env | cut -d= -f2-)
          export AWS_SECRET_ACCESS_KEY=$(grep '^AWS_SECRET_ACCESS_KEY=' .env | cut -d= -f2-)
          export AWS_REGION=$(grep '^AWS_REGION=' .env | cut -d= -f2-)
          export SES_FROM_EMAIL=$(grep '^SES_FROM_EMAIL=' .env | cut -d= -f2-)
          (cd lambda/deploy && npm install)
          bash lambda/deploy/deploy-all.sh

      - name: Write SSH private key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy (build, push to Docker Hub, SSH in for blue-green cutover)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: /home/runner/.ssh/deploy_key
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          export TAG="$(git rev-parse --short HEAD)"
          bash k8s/aws/deploy-aws.sh
