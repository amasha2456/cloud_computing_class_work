global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: event-service
    static_configs:
      - targets: ["event-service:5001"]

  - job_name: program-service
    static_configs:
      - targets: ["program-service:5002"]

  - job_name: registration-service
    static_configs:
      - targets: ["registration-service:5003"]

  - job_name: email-service
    static_configs:
      - targets: ["email-service:5004"]

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:5005"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
