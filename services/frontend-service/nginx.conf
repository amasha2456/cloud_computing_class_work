server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(html|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Same-origin reverse proxy to each backend service. Works unchanged in
    # both docker-compose and Kubernetes because the upstream names below
    # match the Service/container names in both environments.
    location /api/v1/event/ {
        proxy_pass http://event-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/program/ {
        proxy_pass http://program-service:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/registration/ {
        proxy_pass http://registration-service:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/auth/ {
        proxy_pass http://auth-service:5006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/collect {
        proxy_pass http://analytics-service:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
