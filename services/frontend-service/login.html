<!doctype html>
<html lang="en">
  <head>
    <title>Admin Login - New Event</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />

    <link
      href="https://fonts.googleapis.com/css?family=Poppins:400,500,600"
      rel="stylesheet"
      type="text/css"
    />

    <style>
      .login-wrapper {
        max-width: 380px;
        margin: 100px auto;
      }
      .login-wrapper h2 {
        margin-bottom: 25px;
        text-align: center;
      }
      .login-wrapper .form-control {
        margin-bottom: 15px;
      }
      .login-wrapper .btn {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="navbar navbar-default admin-navbar" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <a href="index.html" class="navbar-brand">New Event &mdash; Admin</a>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="login-wrapper">
        <h2>Admin Login</h2>
        <div id="login-alert"></div>
        <form id="login-form">
          <input
            type="text"
            class="form-control"
            id="login-username"
            placeholder="Username"
            required
            autofocus
          />
          <input
            type="password"
            class="form-control"
            id="login-password"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn btn-danger">Log In</button>
        </form>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
      function escapeHtml(str) {
        return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }

      if (Auth.isLoggedIn()) {
        window.location.href = "admin.html";
      }

      document.getElementById("login-form").addEventListener("submit", function (evt) {
        evt.preventDefault();

        var alertBox = document.getElementById("login-alert");
        var username = document.getElementById("login-username").value;
        var password = document.getElementById("login-password").value;

        AuthAPI.login(username, password)
          .then(function (data) {
            Auth.setToken(data.token);
            window.location.href = "admin.html";
          })
          .catch(function (err) {
            alertBox.innerHTML =
              '<p class="alert alert-danger">' + escapeHtml(err.message) + "</p>";
          });
      });
    </script>
  </body>
</html>
