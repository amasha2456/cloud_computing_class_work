server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(html|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Same-origin reverse proxy to each backend service deployed in this
    # AWS cluster. analytics-service is intentionally NOT proxied here -
    # it isn't part of this scoped-down deployment (needs ClickHouse, which
    # doesn't fit the free-tier instance), unlike the full stack on
    # docker-compose/kind where nginx.conf proxies it too. A static
    # proxy_pass to a host that doesn't exist would make nginx refuse to
    # start at all, hence this separate config rather than a shared one.
    location /api/v1/event/ {
        proxy_pass http://event-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/program/ {
        proxy_pass http://program-service:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/registration/ {
        proxy_pass http://registration-service:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/auth/ {
        proxy_pass http://auth-service:5006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
